services:
  - type: web
    name: baocao-v6
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: CLIENT_ID
        sync: false
      - key: CLIENT_SECRET
        sync: false
      - key: TENANT_ID
        sync: false
      - key: SITE_ID
        sync: false
      - key: SHAREPOINT_SITE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
