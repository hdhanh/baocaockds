<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng Nhập</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #1a2744 0%, #243060 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      font-family: 'Segoe UI', sans-serif;
    }
    .card {
      border: none;
      border-radius: 20px;
      box-shadow: 0 12px 40px rgba(0,0,0,.45);
      width: 100%;
      max-width: 400px;
      overflow: hidden;
    }
    .card-header {
      background: #f4a01c;
      text-align: center;
      padding: 28px 24px 22px;
    }
    .logo { font-size: 2.8rem; }
    .card-header h4 {
      margin: 6px 0 0;
      color: #fff;
      font-weight: 800;
      font-size: 1.3rem;
    }
    .card-header p { margin: 4px 0 0; color: rgba(255,255,255,.85); font-size: .88rem; }
    .card-body { padding: 28px 24px 20px; }
    label { font-weight: 600; color: #2d3748; font-size: .92rem; margin-bottom: 5px; }
    .form-control {
      font-size: 1rem;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1.5px solid #dde1e9;
    }
    .form-control:focus {
      border-color: #f4a01c;
      box-shadow: 0 0 0 3px rgba(244,160,28,.15);
    }
    .btn-login {
      background: #f4a01c;
      border: none;
      color: #fff;
      font-weight: 700;
      font-size: 1.05rem;
      padding: 13px;
      border-radius: 10px;
      width: 100%;
      margin-top: 6px;
      transition: background .2s;
    }
    .btn-login:hover { background: #d4880f; }
    .card-footer {
      background: #f8f9fb;
      text-align: center;
      color: #9ca3b0;
      font-size: .8rem;
      padding: 14px;
      border-top: 1px solid #eef0f4;
    }
    .alert { border-radius: 10px; font-size: .9rem; }
  </style>
</head>
<body>
<div class="card">
  <div class="card-header">
    <div class="logo">HH</div>
    <h4>Công ty TNHH Hòa Hiệp</h4>
    <p>Báo cáo khối lượng thi công ngày</p>
  </div>

  <div class="card-body">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }} alert-dismissible fade show py-2">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="/" autocomplete="off">
      <div class="mb-3">
        <label>Tên đăng nhập</label>
        <input type="text" class="form-control" name="username"
               placeholder="VD: hvc" required autofocus>
      </div>
      <div class="mb-4">
        <label>Mật khẩu</label>
        <input type="password" class="form-control" name="password"
               placeholder="Nhập mật khẩu" required>
      </div>
      <button type="submit" class="btn-login">Đăng Nhập →</button>
    </form>
  </div>

  <div class="card-footer">Liên hệ Hoàng Đức Hạnh - Phòng KH-QLDA </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
