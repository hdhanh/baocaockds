<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Đăng Nhập</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { min-height:100vh; background:linear-gradient(145deg,#10522d 0%,#1a2744 100%);
           display:flex; align-items:center; justify-content:center; padding:20px; }
    .card-login { background:#fff; border-radius:20px; padding:36px 28px;
                  box-shadow:0 12px 40px rgba(0,0,0,.3); width:100%; max-width:390px; }
    .logo { text-align:center; margin-bottom:28px; }
    .logo h1 { font-size:2rem; font-weight:900; color:#10522d; margin:0; }
    .logo p  { font-size:.85rem; color:#888; margin:4px 0 0; }
    .form-control { border-radius:10px; padding:12px 14px; border:1.5px solid #dde1e9; font-size:.95rem; }
    .form-control:focus { border-color:#10522d; box-shadow:0 0 0 3px rgba(16,82,45,.15); }
    .btn-login { background:linear-gradient(135deg,#10522d,#1a2744); color:#fff; border:none;
                 border-radius:11px; font-weight:700; font-size:1rem; padding:13px;
                 width:100%; margin-top:8px; transition:opacity .15s; }
    .btn-login:hover { opacity:.88; color:#fff; }
    .form-label { font-weight:600; font-size:.88rem; color:#444; }
    .alert { border-radius:10px; font-size:.88rem; }
  </style>
</head>
<body>
<div class="card-login">
  <div class="logo">
    <h1>CKDS</h1>
    <p>Quản lý phiếu Nhập - Xuất</p>
  </div>
  {% with msgs = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in msgs %}
      <div class="alert alert-{{ cat }} mb-3">{{ msg }}</div>
    {% endfor %}
  {% endwith %}
  <form method="POST">
    <div class="mb-3">
      <label class="form-label">Tên đăng nhập</label>
      <input type="text" name="username" class="form-control" placeholder="Nhập username" autofocus required>
    </div>
    <div class="mb-4">
      <label class="form-label">Mật khẩu</label>
      <input type="password" name="password" class="form-control" placeholder="••••••••" required>
    </div>
    <button type="submit" class="btn-login">ĐĂNG NHẬP</button>
  </form>
</div>
</body>
</html>
